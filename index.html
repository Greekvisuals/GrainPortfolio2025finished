    <style>
      body {
        background-color: #0a0a0a;
        color: #ffffff;
        font-family: 'Inter', sans-serif;
      }
      h1, h2, h3, .font-display {
        font-family: 'Antonio', sans-serif;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0a0a0a;
      }
      ::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #555;
      }
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      @keyframes marquee {
        0% { transform: translateX(0); }
        100% { transform: translateX(-33.3333%); }
      }
      /* Film Halation Effect for Images */
      .logo-halation {
        display: inline-flex;
        opacity: 0.6;
        /* Using drop-shadow to wrap the glow around the alpha channel of the images */
        filter: 
          drop-shadow(0 0 12px rgba(230,120,40,0.8))
          drop-shadow(0 0 32px rgba(210,70,20,0.4))
          drop-shadow(0 0 80px rgba(180,40,10,0.3));
        transition: all 0.4s ease;
        /* Fix for WebKit clipping drop-shadows on hardware-accelerated layers */
        padding: 60px;
        margin: -60px;
        transform: translateZ(0);
        will-change: filter, opacity;
        pointer-events: none; /* Prevent padded area from stealing hovers */
      }
      .group:hover .logo-halation {
        opacity: 1;
        filter: 
          drop-shadow(0 0 20px rgba(230,120,40,0.9))
          drop-shadow(0 0 50px rgba(210,70,20,0.6))
          drop-shadow(0 0 120px rgba(180,40,10,0.4));
      }
      .logo-halation-strong {
        display: inline-flex;
        opacity: 1;
        filter: 
          drop-shadow(0 0 20px rgba(230,120,40,0.9))
          drop-shadow(0 0 50px rgba(210,70,20,0.6))
          drop-shadow(0 0 120px rgba(180,40,10,0.4));
        padding: 60px;
        margin: -60px;
        transform: translateZ(0);
        pointer-events: none;
      }
      /* Glowing Red Button with Halation and Distortion */
      .btn-glow-red {
        position: relative;
        background: #7a0808;
        border: 1px solid rgba(255, 50, 50, 0.4);
        color: #ffffff;
        box-shadow: 
          0 0 15px rgba(200, 10, 10, 0.6),
          0 0 40px rgba(150, 0, 0, 0.4),
          inset 0 0 15px rgba(200, 10, 10, 0.3);
        transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        overflow: hidden;
      }
      .btn-glow-red:hover {
        background: #960a0a;
        border-color: rgba(255, 50, 50, 0.8);
        box-shadow: 
          0 0 25px rgba(255, 30, 30, 0.8),
          0 0 60px rgba(220, 10, 10, 0.6),
          0 0 120px rgba(150, 0, 0, 0.4),
          inset 0 0 25px rgba(255, 50, 50, 0.4);
        /* Distort effect */
        transform: scale(1.05) skewX(-4deg) skewY(1deg);
        filter: contrast(1.2) brightness(1.2) drop-shadow(0 0 10px rgba(255,0,0,0.8));
      }
      .btn-glow-red::after {
        content: '';
        position: absolute;
        top: 0; left: -100%;
        width: 50%; height: 100%;
        background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
        transform: skewX(-20deg);
        transition: all 0.6s ease;
        z-index: 5;
      }
      .btn-glow-red:hover::after {
        left: 150%;
      }
    </style>
