      /* Film Halation Effect for Images */

        display: inline-flex;

        /* Using drop-shadow to wrap the glow around the alpha channel of the images */
        filter: 
          drop-shadow(0 0 12px rgba(230,120,40,0.8))
          drop-shadow(0 0 32px rgba(210,70,20,0.4))
          drop-shadow(0 0 80px rgba(180,40,10,0.3));
        transition: all 0.4s ease;
        /* Fix for WebKit clipping drop-shadows on hardware-accelerated layers */
        padding: 60px;
        margin: -60px;
        transform: translateZ(0);
        will-change: filter, opacity;
        pointer-events: none; /* Prevent padded area from stealing hovers */
      }
      .group:hover .logo-halation {
